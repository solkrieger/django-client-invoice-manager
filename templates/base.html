<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Invoice Manager{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="{% url 'dashboard' %}">Invoice Manager</a>

    <div>
      {% if user.is_authenticated %}
        <a class="btn btn-light btn-sm" href="{% url 'dashboard' %}">Dashboard</a>
        <a class="btn btn-light btn-sm" href="{% url 'client_list' %}">Clients</a>
        <a class="btn btn-light btn-sm" href="{% url 'invoice_list' %}">Invoices</a>

        <form action="{% url 'logout' %}" method="post" style="display:inline;">
          {% csrf_token %}
          <button class="btn btn-danger btn-sm">Logout</button>
        </form>

      {% else %}
        <a class="btn btn-light btn-sm" href="{% url 'login' %}">Login</a>
        <a class="btn btn-success btn-sm" href="{% url 'register' %}">Register</a>
      {% endif %}
    </div>

  </div>
</nav>

<div class="container mt-4">

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-success">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}

</div>

</body>
</html>
