{% extends "base.html" %}

{% block content %}

<h2>Delete Invoice</h2>

<p>Are you sure you want to delete Invoice {{ invoice.id }}?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>

<a href="{% url 'invoice_detail' invoice.id %}">Cancel</a>

{% endblock %}
