{% extends "base.html" %}

{% block content %}

<h2>Invoices</h2>

<ul>
{% for invoice in invoices %}
<li>
    <a href="{% url 'invoice_detail' invoice.id %}">
        Invoice {{ invoice.id }}
    </a>
</li>
{% endfor %}
</ul>
<a href="/invoices/">All</a>
<a href="/invoices/?status=PAID">Paid</a>
<a href="/invoices/?status=UNPAID">Unpaid</a>

{% endblock %}
